<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    body {
      background-color: hsl(212, 45%, 89%)  ; 
      font-family: "Outfit", sans-serif;
    }
    img {
        display: block;
        width: 100%;
        border-radius: 30px;
    }
    main{
        background-color:hsl(0, 0%, 100%);
        max-width: 80%;
        padding: 10px;
        margin: 0 auto;
        border-radius: 30px;
        font-family: "Lato", sans-serif;
        

    }
      /* p{
        font-size: 15px;
        color: hsl(212, 45%, 89%,);
        font-weight: 400;
        text-align: center;
      } */
      h1{
        font-weight: 700;
       
        
        /* font-size: 21px; */
      }
      div {
        margin: 2em 0.2em;
      }
      .center {
          text-align:center;
         }

          .head {
          font-size: 20px;
          font-weight: 700;
          text-align: center;
         }


      /* responsive design for laptop*/
      @media(min-width: 765px) {
         main {
           max-width: 30%;
         }
        .head {
          font-size: 25px;
        }
       
        
      }
  </style>
</head>

<body >
  <main>
    <img src="images\image-qr-code.png"/>

    <div> <p class="head">improve your front-end <br/> skill by building project</p>
    <p class="center">Scan the QR code to visit front-end mentor and take your coding skill to the next level</p>
   </div>
   

  </main>
</body>
</html>
